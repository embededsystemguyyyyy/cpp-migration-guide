name: C++23 CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        compiler:
          - { cc: gcc-13,   cxx: g++-13     }
          - { cc: clang-17, cxx: clang++-17 }
        exclude:
          - os: windows-latest
            compiler: { cc: clang-17, cxx: clang++-17 }
          - os: macos-latest
            compiler: { cc: gcc-13, cxx: g++-13 }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13 (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler.cc == 'gcc-13'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13

      - name: Install Clang 17 (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler.cc == 'clang-17'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=23
        working-directory: chapter-03-toolchain/cmake-templates/cpp23-starter

      - name: Build
        run: cmake --build build --config Release
        working-directory: chapter-03-toolchain/cmake-templates/cpp23-starter

      - name: Run
        run: ./build/cpp23_starter
        working-directory: chapter-03-toolchain/cmake-templates/cpp23-starter

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy-17

      - name: Configure with compile commands
        run: |
          cmake -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_STANDARD=23
        working-directory: chapter-03-toolchain/cmake-templates/cpp23-starter

      - name: Run clang-tidy
        run: |
          clang-tidy-17 main.cpp \
            -p build \
            --warnings-as-errors='*'
        working-directory: chapter-03-toolchain/cmake-templates/cpp23-starter
